<!DOCTYPE html>
<html lang="en">

<head>
    <title>NBH Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f0f0f0;
        }

        /* Login Box */
        #loginBox {
            width: 300px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px grey;
            text-align: center;
        }

        #loginBox h2 {
            color: darkblue;
        }

        #loginBox input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        #loginBox button {
            width: 100%;
            padding: 10px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        #loginBox button:hover {
            background: #fdd835;
            color: black;
        }

        /* Admin Table */
        #adminBox {
            display: none;
        }

        #adminBox h2 {
            color: darkblue;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: darkblue;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        #logoutBtn {
            padding: 8px 20px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
    </style>
</head>

<body>

    <!-- Login Section -->
    <div id="loginBox">
        <h2>🔐 NBH Admin Login</h2>
        <input type="text" id="username" placeholder="Username" /><br>
        <input type="password" id="password" placeholder="Password" /><br>
        <p id="errorMsg" style="color:red; display:none;">❌ Wrong credentials!</p>
        <button onclick="login()">Login</button>
    </div>

    <!-- Admin Data Section -->
    <div id="adminBox">
        <button id="logoutBtn" onclick="logout()">Logout</button>
        <h2>📋 NBH — Contact Form Submissions</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Naam</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                <tr>
                    <td colspan="7">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let token = '';

        // Login function
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        token = data.token;
                        document.getElementById('loginBox').style.display = 'none';
                        document.getElementById('adminBox').style.display = 'block';
                        loadData(); // Data load karo
                    } else {
                        document.getElementById('errorMsg').style.display = 'block';
                    }
                });
        }

        // Data load karo
        function loadData() {
            fetch('/admin/contacts', {
                headers: { 'authorization': token }
            })
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('dataTable');
                    tbody.innerHTML = '';

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7">Koi data nahi hai abhi.</td></tr>';
                        return;
                    }

                    data.forEach(row => {
                        tbody.innerHTML += `
            <tr>
              <td>${row.id}</td>
              <td>${row.name}</td>
              <td>${row.phone}</td>
              <td>${row.address}</td>
              <td>${row.email}</td>
              <td>${row.message}</td>
              <td>${new Date(row.created_at).toLocaleString('en-IN')}</td>
            </tr>`;
                    });
                });
        }

        // Logout
        function logout() {
            token = '';
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminBox').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>

</body>

</html>
